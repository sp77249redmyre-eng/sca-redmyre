function urlBase64ToUint8Array(base64String) {
  const padding = "=".repeat((4 - (base64String.length % 4)) % 4);
  const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
  const rawData = atob(base64);
  const outputArray = new Uint8Array(rawData.length);
  for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
  return outputArray;
}

async function ensureServiceWorker() {
  if (!("serviceWorker" in navigator)) throw new Error("Service Worker not supported");
  const reg = await navigator.serviceWorker.register("/sw.js?v=5");
  return reg;
}

async function hasActivePushSubscription() {
  try {
    const reg = await navigator.serviceWorker.getRegistration();
    if (!reg) return false;
    const sub = await reg.pushManager.getSubscription();
    return !!sub;
  } catch {
    return false;
  }
}

async function getPushUiState() {
  const perm = (typeof Notification !== "undefined") ? Notification.permission : "denied";
  const sub = await hasActivePushSubscription();
  return { perm, sub };

async function enablePushForCurrentUser() {
  if (!("Notification" in window) || !("serviceWorker" in navigator)) {
    alert("This device/browser cannot enable push notifications.\n\niPhone: Safari + Add to Home Screen required.\nAndroid: Chrome recommended.");
    return;
  }

  const user = await getUser();
  if (!user) { alert("Please log in first."); return; }

  if (!VAPID_PUBLIC_KEY || VAPID_PUBLIC_KEY.includes("PASTE_YOUR_VAPID_PUBLIC_KEY")) {
    showToast("Notifications are not configured yet.");
    return;
  }

  if (Notification.permission === "denied") {
    alert("Notifications are blocked in phone settings.");
    return;
  }

  const permission = await Notification.requestPermission();
  if (permission !== "granted") {
    showToast("Notifications not enabled");
    return;
  }

  const reg = await ensureServiceWorker();

  let sub = await reg.pushManager.getSubscription();
  if (!sub) {
    sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
    });
  }

  const payload = {
    user_id: user.id,
    email: (user.email || "").toLowerCase(),
    subscription: sub,
    updated_at: new Date().toISOString()
  };

  const { error } = await supabase.from(PUSH_TABLE).upsert(payload, { onConflict: "user_id" });
  if (error) {
    console.error(error);
    alert("Failed to save subscription: " + (error.message || error));
    return;
  }

  showToast("Notifications enabled ✅");
}

async function disablePushForCurrentUser() {
  const user = await getUser();
  if (!user) return;

  const reg = await navigator.serviceWorker.getRegistration();
  if (reg) {
    const sub = await reg.pushManager.getSubscription();
    if (sub) await sub.unsubscribe();
  }

  await supabase.from(PUSH_TABLE).delete().eq("user_id", user.id);
  showToast("Notifications disabled");
}

function bellSvg(){
  const svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("viewBox","0 0 24 24");
  svg.setAttribute("class","bell");
  svg.setAttribute("fill","none");
  svg.setAttribute("stroke","currentColor");
  svg.setAttribute("stroke-width","2");
  svg.setAttribute("stroke-linecap","round");
  svg.setAttribute("stroke-linejoin","round");
  const p1 = document.createElementNS(svg.namespaceURI,"path");
  p1.setAttribute("d","M18 8a6 6 0 10-12 0c0 7-3 7-3 7h18s-3 0-3-7");
  const p2 = document.createElementNS(svg.namespaceURI,"path");
  p2.setAttribute("d","M13.73 21a2 2 0 01-3.46 0");
  svg.appendChild(p1); svg.appendChild(p2);
  return svg;
}

function createPushControl(){
  const wrap = el("div",{class:"pushPanel"},[]);
  const left = el("div",{class:"pushLeft"},[
    bellSvg(),
    el("div",{class:"pushText"},[
      el("div",{class:"pushTitle"},["Notifications"]),
      el("div",{class:"pushSub"},["Enable/disable alerts on this phone"])
    ])
  ]);

  const btn = el("button",{ disabled:true },["Checking…"]);
  wrap.appendChild(left);
  wrap.appendChild(btn);

  (async () => {
    const { perm, sub } = await getPushUiState();
    // If VAPID public key is not set, disable the control (no popups for normal users)
    if(!VAPID_PUBLIC_KEY || VAPID_PUBLIC_KEY === "PASTE_YOUR_VAPID_PUBLIC_KEY_HERE"){
      btn.disabled = true;
      btn.className = "";
      btn.textContent = "Notifications unavailable";
      return;
    }
    btn.disabled = false;

    const setEnable = ()=>{
      btn.className = "info";
      btn.textContent = "Enable";
      btn.onclick = () => enablePushForCurrentUser().then(async () => {
        const s = await getPushUiState();
        if(s.sub) setDisable();
      });
    };

    const setDisable = ()=>{
      btn.className = "danger";
      btn.textContent = "Disable";
      btn.onclick = () => disablePushForCurrentUser().then(async () => {
        const s = await getPushUiState();
        if(!s.sub) setEnable();
      });
    };

    if (sub) { setDisable(); return; }

    if (perm === "denied") {
      btn.className = "";
      btn.textContent = "Blocked";
      btn.onclick = () => alert("Notifications are blocked on this device. Please enable notifications in phone settings.");
      return;
    }

    setEnable();
  })();

  return wrap;
}

      .from("votes")
      .select("id")
      .eq("quote_id", quoteId)
      .eq("user_id", myId)

  async function uploadOne(file){
    const user = await getUser();
    if(!user) throw new Error("Not signed in");

    const mime = (file?.type || "").toLowerCase();
    if(!ATTACH.acceptMime.includes(mime)){
      throw new Error("Only PDF, JPG, PNG files are allowed.");
    }

    const safeName = file.name.replace(/[^\w.\- ]+/g,"_");
    const path = `${user.id}/${Date.now()}-${safeName}`;

    const { error } = await supabase.storage
      .from("quotes")
      .upload(path, file, { upsert:false, contentType: file.type || "application/octet-stream" });

    if(error) throw error;
    return { path, name: safeName, type: file.type || "" };
  }

  async function uploadMany(fileList){
    const files = Array.from(fileList || []);
    if(files.length > ATTACH.maxFiles){
      throw new Error(`Max ${ATTACH.maxFiles} attachments per quote.`);
    }
    const metas = [];
    for(const f of files){
      metas.push(await uploadOne(f));
    }
    return metas;
  }

    if(error) throw error;
  }

  async function ensureExpiryAndAuto(quote, votes){
    // Expiry (treat as declined, but record as 'expired')
    if(quote.status === "pending" && quote.expiry_date && new Date() > new Date(quote.expiry_date)){
      await updateQuoteStatus(quote.id, "declined");
      await setResolvedMetaIfMissing(quote.id, "expired");
      quote.status = "declined";
      return quote;
    }
    if(quote.status !== "pending") return quote;

    const myVotes = votes.filter(v => v.quote_id === quote.id);
    const approvals = myVotes.filter(v=>v.vote==="approve").length;
    const declines  = myVotes.filter(v=>v.vote==="decline").length;

    if(approvals >= RULES.approvalsRequired){
      await updateQuoteStatus(quote.id, "approved");
      await setResolvedMetaIfMissing(quote.id, "approved");
      quote.status="approved";
    } else if(declines >= RULES.declinesToAutoDecline){
      await updateQuoteStatus(quote.id, "declined");
      await setResolvedMetaIfMissing(quote.id, "declined");
      quote.status="declined";
    }
    return quote;
  }

    ]));

    if(!open) return wrap;

    // History-only filters: [Search] [Resolution] [Workflow]

      el("option",{value:"in_progress"},["In Progress"]),
      el("option",{value:"completed"},["Completed"]),
      el("option",{value:"none"},["- (Not set)"]),
    ]);
    wfSel.value = HF.wf || "all";

    function persist(){

    }

    wrap.appendChild(el("div",{class:"qControls"},[searchInput, resSel, wfSel]));

    function apply(){
      const term = (searchInput.value||"").trim().toLowerCase();
      const res = (resSel.value||"all").toLowerCase();
      const wf = (wfSel.value||"all").toLowerCase();

      let shown = 0;
      for(const r of rows){
        const hay = (r.getAttribute("data-hay")||"").toLowerCase();
        const rres = (r.getAttribute("data-res")||"").toLowerCase();
        const rwf = (r.getAttribute("data-wf")||"").toLowerCase();

        const okTerm = term ? hay.includes(term) : true;
        const okRes = (res==="all") ? true : rres === res;
        const okWf = (wf==="all") ? true : (wf==="none" ? !rwf : rwf === wf);

        const show = okTerm && okRes && okWf;
        r.style.display = show ? "" : "none";
        if(show) shown++;
      }
      empty.style.display = shown ? "none" : "";
    }

    searchInput.addEventListener("input", ()=>{ persist(); apply(); });
    resSel.addEventListener("change", ()=>{ persist(); apply(); });
    wfSel.addEventListener("change", ()=>{ persist(); apply(); });

    setTimeout(()=>apply(),0);
    return wrap;
  }

  async function accessPanel(profile){
    const roleText =
      profile.role === "admin" ? "Admin (can create quotes)" :
      profile.role === "committee" ? "Committee (can vote)" :
      "Observer (view only)";

    const quotes = await listQuotes();
    const votes  = await listVotes();

    return el("div",{class:"card"},[
      el("h2",{},["Access"]),
      el("div",{class:"muted"},[roleText]),
      el("div",{class:"hr"},[]),
      el("div",{class:"muted"},[
        "• If a quote is not decided within ",
        el("b",{},[String(RULES.expiryDays)]),
        " days, it will be treated as ",
        el("b",{},["Declined"]),
        ".",
        el("br",{},[]),
        "• If approvals reach ",
        el("b",{},[String(RULES.approvalsRequired)]),
        ", status becomes ",
        el("b",{},["Approved"]),
        ".",
        el("br",{},[]),
        "• If declines reach ",
        el("b",{},[String(RULES.declinesToAutoDecline)]),
        ", status becomes ",
        el("b",{},["Declined"]),
        "."
      ]),
      await historyNode(quotes, votes, profile),
    ]);
  }

  async function adminPanel(){
    const project = el("input",{placeholder:"Project"},[]);
    const vendor  = el("input",{placeholder:"Vendor"},[]);
    const amount  = el("input",{type:"number",placeholder:"Amount (ex GST)"},[]);
    const note    = el("textarea",{placeholder:"Comment"},[]);

    const attach = el("input",{
      type:"file",
      multiple:"multiple",
      accept:"application/pdf,image/jpeg,image/png"
    },[]);

    const submit = el("button",{class:"primary", onClick: async()=>{
      try{
        const p = project.value.trim();
        const v = vendor.value.trim();
        const a = Number(amount.value);
        if(!p || !v || !a){ alert("Please fill Project, Vendor and Amount."); return; }

        const chosen = attach.files ? Array.from(attach.files) : [];
        if(chosen.length > ATTACH.maxFiles){
          alert(`Max ${ATTACH.maxFiles} attachments per quote.`);
          return;
        }

        let filesMeta = [];
        if(chosen.length){
          for(const f of chosen){
            if(!ATTACH.acceptMime.includes((f.type||"").toLowerCase())){
              alert("Only PDF, JPG, PNG files are allowed.");
              return;
            }
          }
          filesMeta = await uploadMany(chosen);
        }

        const commentPayload = JSON.stringify({ note: note.value.trim(), files: filesMeta, resolved_at: null, workflow: null, resolved_as: null });

        const expiry = addDaysISO(RULES.expiryDays);
        const user = await getUser();
        if(!user) throw new Error("Not signed in");

        const payload = {
          id: uuid(),
          project: p,
          vendor: v,
          amount: a,
          status: "pending",
          expiry_date: expiry,
          created_by: user.id,
          comment: commentPayload,
          created_at: new Date().toISOString(),
        };

        await insertQuote(payload);
        alert("Quote submitted as Pending.");
        await renderApp();
      }catch(e){ alert(e?.message || String(e)); }
    }},["Submit Quote"]);

    // Enter in inputs submits (except textarea)
    const onEnterSubmit = (e)=>{
      if(e.key==="Enter"){
        e.preventDefault();
        submit.click();
      }
    };
    project.addEventListener("keydown", onEnterSubmit);
    vendor.addEventListener("keydown", onEnterSubmit);
    amount.addEventListener("keydown", onEnterSubmit);

    return el("div",{class:"card"},[
      el("h2",{},["Admin – Create Quote"]),
      label("Project", project),
      label("Vendor", vendor),
      label("Amount (ex GST)", amount),
      label("Comment", note),
      label(`Attach files (PDF/JPG/PNG, up to ${ATTACH.maxFiles})`, attach),
      el("div",{class:"spacer"},[]),
      submit
    ]);
  }

  // ✅ filtering without re-render (kept from original; no longer used on right)
  function applyQuoteFilter(){
    const term = (QUOTE_FILTER.q || "").trim().toLowerCase();
    const status = (QUOTE_FILTER.status || "all").toLowerCase();

    const nodes = Array.from(document.querySelectorAll("[data-quote-item='1']"));
    let shown = 0;

    for(const n of nodes){
      const st = (n.getAttribute("data-status") || "").toLowerCase();
      const hay = (n.getAttribute("data-hay") || "").toLowerCase();

      const okStatus = (status === "all") ? true : st === status;
      const okTerm = term ? hay.includes(term) : true;

      const show = okStatus && okTerm;
      n.style.display = show ? "" : "none";
      if(show) shown++;
    }

    const empty = document.getElementById("rm_no_results");
    if(empty){
      empty.style.display = shown ? "none" : "";
    }
  }

  function persistQuoteFilter(){
    lsWrite(LS_KEYS.quoteFilter, QUOTE_FILTER);
  }

  async function quotesPanel(profile){
    const card = el("div",{class:"card"},[
      el("h2",{},["Quotes (Main Voting)"]),
      el("div",{class:"muted"},["Pending quotes only. Use History (left) for approved/declined/expired records."])
    ]);

    // Push notifications control (Committee/Observer personal screen)
    if(profile.role === "committee" || profile.role === "observer"){
      card.appendChild(createPushControl());
    }

    const quotes = await listQuotes();
    const votes  = await listVotes();

    // Pending only (after auto/expiry rules)
    const pending = [];
    for(const q0 of quotes){
      const q = await ensureExpiryAndAuto({...q0}, votes);
      if(String(q.status||"pending").toLowerCase() === "pending") pending.push(q);
    }

    if(!pending.length){
      card.appendChild(el("div",{class:"muted", style:"margin-top:10px;"},["No pending quotes."]));
      return card;
    }

    for(const q0 of pending){
      // Committee: hide items already voted by me
      if(profile.role === "committee"){
        const mine = votes.find(v => v.quote_id === q0.id && v.user_id === profile.id);
        if(mine) continue;
      }

      const q = q0;
      const st = "pending";

      const parsed = parseComment(q.comment);
      const noteText = parsed.note || "";
      const files = parsed.files || [];

      const approvals = votes.filter(v=>v.quote_id===q.id && v.vote==="approve").length;
      const declines  = votes.filter(v=>v.quote_id===q.id && v.vote==="decline").length;

      const createdTxt = fmtDate(q.created_at);
      const dueTxt = q.expiry_date ? fmtDate(q.expiry_date) : "-";
      const leftDays = q.expiry_date ? daysUntil(q.expiry_date) : null;
      const leftLabel = (leftDays === null) ? "" : (leftDays <= 0 ? " (due)" : ` (${leftDays} days left)`);

      const hay = `${q.project||""} ${q.vendor||""}`.toLowerCase();

      const item = el("div",{class:"quote", "data-quote-item":"1", "data-status":st, "data-hay":hay},[
        el("div",{},[
          el("strong",{},[q.project || "(No project)"]),
          el("div",{class:"muted"},[
            `${q.vendor} • ${fmtMoney(q.amount)} • Created: `,
            el("b",{},[createdTxt]),
            ` • Due: `,
            el("b",{},[dueTxt]),
            leftLabel,
            ` • Approvals ${approvals} • Declines ${declines}`
          ]),
          el("div",{style:"margin-top:6px;"},[
            el("a",{class:"link",href:"#", onClick:(e)=>{
              e.preventDefault();
              details.style.display = (details.style.display === "none") ? "" : "none";
            }},["View details"])
          ])
        ]),
        el("div",{},[ el("span",{class:"pill warn"},["Pending"]) ])
      ]);

      const details = el("div",{style:"grid-column:1 / -1; display:none;"},[]);
      details.appendChild(el("div",{class:"hr"},[]));

      details.appendChild(el("div",{class:"detailLabel"},["Comment"]));
      details.appendChild(el("div",{class:"detailBox"},[noteText || "-"]));

      details.appendChild(el("div",{class:"detailLabel"},["Attachments"]));
      if(!files?.length){
        details.appendChild(el("div",{class:"detailBox"},["-"]));
      } else {
        const box = el("div",{class:"detailBox"},[]);
        for(const f of files){
          const url = await signedUrl(f.path);
          const kind = fileTypeKind(f.type, f.name);
          const labelText = `${fileLabelByType(f.type, f.name)} (${f.name || "file"})`;

          if(kind === "img"){
            const a = el("a",{class:"link", href:"#", onClick:(e)=>{
              e.preventDefault();
              openImageModal({ titleText: f.name || "Image", imageUrl: url });
            }},[labelText]);
            box.appendChild(el("div",{},[a]));
          } else {
            const a = el("a",{class:"link",href:url,target:"_blank",rel:"noopener"},[labelText]);
            box.appendChild(el("div",{},[a]));
          }
        }
        details.appendChild(box);
      }

      const canVote = (profile.role === "committee");
      if(canVote){
        details.appendChild(el("div",{class:"hr"},[]));
        details.appendChild(el("div",{class:"row"},[
          el("button",{class:"primary", onClick: async()=>{
            await upsertVote(q.id, profile.id, "approve");
            showToast("✅ Vote recorded: Approved");
            await renderApp();
          }},["Approve"]),
          el("button",{onClick: async()=>{
            await upsertVote(q.id, profile.id, "decline");
            showToast("⚠ Vote recorded: Declined");
            await renderApp();
          }},["Decline"])
        ]));
      }

      if(profile.role === "admin"){
        details.appendChild(el("div",{class:"hr"},[]));
        details.appendChild(el("div",{class:"row"},[
          el("button",{ onClick: ()=>{
            openEditCommentModal({
              titleText: `Edit Comment — ${q.project || "(No project)"}`,
              initialText: (noteText || ""),
              onSave: async(nextText)=>{
                await updateQuoteComment(q.id, nextText);
                showToast("Comment updated");
                await renderApp();
              }
            });
          }},["Edit Comment"]),
          el("button",{class:"danger", onClick: async()=>{
            const ok = confirm("Delete this quote?\n\nThis cannot be undone.");
            if(!ok) return;
            try{ await deleteQuoteEverywhere(q); showToast("Deleted"); await renderApp(); }
            catch(e){ alert(e?.message || String(e)); }
          }},["Delete Quote"])
        ]));
      }

      item.appendChild(details);
      card.appendChild(item);
    }

    return card;
  }

  async function appScreen(){
    const profile = await getMyProfile();

    const top = el("div",{class:"topbar"},[
      el("div",{},[
        logoNode(),
        el("div",{class:"sub"},["Strata Plan 77249 • Quote Approval System"])
      ]),
      el("div",{class:"row"},[
        el("span",{class:"tag"},[`${profile.role.toUpperCase()} • ${profile.email}`]),
        el("span",{class:"tag ver"},[BUILD]),

        el("button",{onClick: async()=>{
          const p1 = prompt("New password (min 8 chars):","");
          if(p1 === null) return;
          if((p1||"").length < 8){ alert("Password must be at least 8 characters."); return; }
          const p2 = prompt("Confirm new password:","");
          if(p2 === null) return;
          if(p1 !== p2){ alert("Passwords do not match."); return; }
          try{
            await changeMyPassword(p1);
            alert("Password updated.");
          }catch(e){ alert(e?.message || String(e)); }
        }},["Change Password"]),

        el("button",{onClick: async()=>{ await signOut(); await renderApp(); }},["Log out"])
      ])
    ]);

    const grid = el("div",{class:"grid"},[]);

    // admin also sees the history table (same as committee/observer)
    if(profile.role === "admin"){
      const left = el("div",{class:"colStack"},[]);
      left.appendChild(await adminPanel());
      left.appendChild(await accessPanel(profile));
      grid.appendChild(left);
    } else {
      grid.appendChild(await accessPanel(profile));
    }

    grid.appendChild(await quotesPanel(profile));

    return el("div",{class:"wrap"},[ top, grid ]);
  }

  async function renderApp(){
    const url = new URL(window.location.href);
    const wantsResetScreen = url.searchParams.get("reset") === "1";

    const session = await getSession();

    if(wantsResetScreen){
      if(!session){
        mount(resetPasswordScreen());
        return;
      }
      mount(setNewPasswordScreen());
      return;
    }

    if(!session){ mount(loginScreen()); return; }

    await initRealtime();

    try{
      mount(await appScreen());
    }catch(e){
      mount(el("div",{class:"wrap"},[
        el("div",{class:"card"},[
          el("div",{style:"display:flex;align-items:center;gap:12px;"},[
            logoNode(),
            el("div",{class:"sub"},["System error"])
          ]),
          el("div",{class:"muted", style:"margin-top:10px;"},[String(e?.message || e)]),
          el("div",{class:"spacer"},[]),
          el("button",{class:"primary", onClick: ()=>renderApp()},["Retry"])
        ])
      ]));
    }
  }

  supabase.auth.onAuthStateChange(()=>{ renderApp(); });
  await renderApp();
</script>
